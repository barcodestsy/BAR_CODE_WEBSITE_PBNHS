<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LRN Barcode Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#00ffcc;
  font-family:Arial,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
#reader{
  width:320px;
  border:3px solid #00ffcc;
  border-radius:12px;
  box-shadow:0 0 20px #00ffcc55;
}
#status{
  margin-top:15px;
  font-size:18px;
  text-align:center;
}
.lrn{font-size:22px;font-weight:bold;color:#00ffaa}
.time{font-size:14px;color:#aaffee;margin-top:5px}
</style>
</head>

<body>

<h2>📊 Attendance Scanner</h2>
<p>Scan <b>Code 128</b> (LRN)</p>

<div id="reader"></div>
<div id="status">⏳ Waiting for scan...</div>

<audio id="beep" src="beep-07.wav" preload="auto"></audio>

<script>
/* ===============================
   CONFIG
================================ */
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbykKJMJP5P1i4MplQNDn3dFeKVUeAL-abKp-X0jI84VpGQo_jYijrrxRIS3sDOEY4uK3g/exec";

/* ===============================
   GLOBALS
================================ */
const statusDiv = document.getElementById("status");
const beep = document.getElementById("beep");
let scanner = null;
let system = {};
let busy = false;

/* ===============================
   LOAD SYSTEM STATUS (ADMIN)
================================ */
async function loadSystem(){
  try{
    const r = await fetch(WEB_APP_URL + "?mode=status");
    system = await r.json();

    if(system.SCANNER_ACTIVE === false){
      statusDiv.innerHTML = "⛔ Scanner disabled by admin";
      return;
    }
  }catch(e){
    statusDiv.innerHTML = "⚠️ Cannot connect to server";
  }
}

/* ===============================
   TIME UTILS
================================ */
function getNow(){
  const n = new Date();
  return {
    date: n.toLocaleDateString(),
    time: n.toLocaleTimeString(),
    hour: n.getHours(),
    minute: n.getMinutes()
  };
}
function isLate(t){
  if(!system.LATE_DETECTION) return false;
  const [h,m] = system.LATE_TIME.split(":").map(Number);
  return t.hour > h || (t.hour === h && t.minute > m);
}

/* ===============================
   SCAN SUCCESS
================================ */
async function onScanSuccess(decodedText){
  if(busy) return;
  busy = true;

  beep.play();

  const lrn = decodedText.trim();
  const t = getNow();
  const late = isLate(t);

  statusDiv.innerHTML = `
    ✅ SCANNED<br>
    <span class="lrn">${lrn}</span>
    <div class="time">
      📅 ${t.date} ⏰ ${t.time}<br>
      ${late ? "🔴 LATE" : "🟢 ON TIME"}
    </div>
  `;

  /* SEND TO GOOGLE SHEET */
  try{
    const res = await fetch(WEB_APP_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        action:"scan",
        lrn: lrn,
        date: t.date,
        time: t.time,
        status: late ? "Late" : "On Time"
      })
    });

    const r = await res.json();

    if(!r.success){
      statusDiv.innerHTML = "⚠️ " + r.message;
    }

  }catch(err){
    statusDiv.innerHTML = "❌ Server error";
  }

  scanner.clear();
  setTimeout(()=>{
    busy = false;
    startScanner();
  },2000);
}

/* ===============================
   START SCANNER
================================ */
function startScanner(){
  scanner = new Html5QrcodeScanner(
    "reader",
    {
      fps:10,
      qrbox:{ width:250, height:120 },
      rememberLastUsedCamera:true
    },
    false
  );
  scanner.render(onScanSuccess);
}

/* ===============================
   INIT
================================ */
(async ()=>{
  await loadSystem();
  if(system.SCANNER_ACTIVE !== false){
    startScanner();
  }
})();
</script>

</body>
</html>
