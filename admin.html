<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}
.card{
  width:95%;
  max-width:900px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
}
h2,h3,h4{text-align:center}
input{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  margin:8px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#00ffff,#00aaff);
}
label{display:block;margin:8px}
.hidden{display:none}
.logout-btn{background:linear-gradient(45deg,#ff4d4d,#ff0000);color:white}
</style>
</head>

<body>
<div class="card">

<h2>🔐 PBNHS BARCODE ADMIN PANEL</h2>

<!-- LOGIN -->
<div id="loginView">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN -->
<div id="adminView" class="hidden">
  <button class="logout-btn" onclick="logout()">Logout</button>

  <h3>⚙️ System Controls</h3>

  <h4>Tools</h4>
  <label><input type="checkbox" id="tDuplicate"> Duplicate Check</label>
  <label><input type="checkbox" id="tTime"> Time Recorder</label>
  <label><input type="checkbox" id="tLate"> Late Detection</label>
  <label><input type="checkbox" id="tBlock"> Block After Cutoff</label>
  <label>Late Time <input type="time" id="lateTime"></label>

  <h4>Messaging</h4>
  <label><input type="checkbox" id="tParentMsg"> Parent Message</label>
  <label><input type="checkbox" id="tAdviserMsg"> Adviser Report</label>
  <label><input type="checkbox" id="tMockMsg"> Mock Mode</label>

  <button onclick="saveSettings()">💾 Save & Sync</button>
  <button onclick="clearLogs()">🗑 Clear Logs</button>

  <p id="statusMsg"></p>
</div>

</div>

<script>
/* ===============================
   CONFIG
================================ */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxx4Ml3adiJ9BETJitCtuPo_wc4Qxgn59vp3XMuZBLy4CCBbw8IqDTF-dYtQr10t_r4og/exec";

/* ===============================
   ADMINS
================================ */
const ADMINS=[
  {user:"admin",pass:"PNBARC@DE"},
  {user:"principal",pass:"PNB2026"},
  {user:"itadmin",pass:"IT@PNB"}
];

/* ===============================
   LOGIN
================================ */
function login(){
  const u=username.value,p=password.value;
  if(ADMINS.find(a=>a.user===u&&a.pass===p)){
    loginView.classList.add("hidden");
    adminView.classList.remove("hidden");
    loadSettings();
  }else{
    loginMsg.innerText="❌ Invalid login";
  }
}
function logout(){location.reload();}

/* ===============================
   LOAD SETTINGS (FROM SHEET)
================================ */
async function loadSettings(){
  const r=await fetch(WEB_APP_URL+"?mode=settings");
  const s=await r.json();

  tDuplicate.checked=s.duplicate;
  tTime.checked=s.time;
  tLate.checked=s.late;
  tBlock.checked=s.block;
  lateTime.value=s.lateTime;
  tParentMsg.checked=s.parentMsg;
  tAdviserMsg.checked=s.adviserMsg;
  tMockMsg.checked=s.mockMsg;
}

/* ===============================
   SAVE SETTINGS (TO SHEET)
================================ */
function saveSettings(){
  const settings={
    duplicate:tDuplicate.checked,
    time:tTime.checked,
    late:tLate.checked,
    block:tBlock.checked,
    lateTime:lateTime.value,
    parentMsg:tParentMsg.checked,
    adviserMsg:tAdviserMsg.checked,
    mockMsg:tMockMsg.checked
  };

  fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"updateSettings",
      settings:settings
    })
  });

  statusMsg.innerText="✅ Settings synced system-wide";
}

/* ===============================
   CLEAR LOGS
================================ */
function clearLogs(){
  if(confirm("Clear all logs?")){
    fetch(WEB_APP_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"clearLogs"})
    });
    statusMsg.innerText="🗑 Logs cleared";
  }
}
</script>

</body>
</html>
