<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Scanner + Admin Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    margin: 0;
    background: #0b0b0b;
    color: #00ffcc;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  .hidden { display: none; }
  #reader {
    width: 320px;
    margin: auto;
    border: 3px solid #00ffcc;
    border-radius: 12px;
  }
  button {
    background: #00ffcc;
    border: none;
    padding: 10px 14px;
    margin: 5px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  input {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
  }
  table {
    width: 95%;
    margin: auto;
    border-collapse: collapse;
  }
  th, td {
    border: 1px solid #00ffcc55;
    padding: 6px;
    font-size: 13px;
  }
  th { background: #00ffcc22; }
  label { display: block; margin: 6px; }
</style>
</head>

<body>

<h2>📊 Attendance Scanner</h2>

<!-- SCANNER VIEW -->
<div id="scannerView">
  <div id="reader"></div>
  <p id="status">⏳ Waiting for scan...</p>
  <button onclick="openAdmin()">🔐 Admin Panel</button>
</div>

<!-- LOGIN -->
<div id="loginView" class="hidden">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="back()">Back</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminView" class="hidden">
  <h3>🛠️ Admin Panel</h3>
  <button onclick="back()">⬅ Back</button>

  <h4>⚙️ Tools (ON / OFF)</h4>
  <label><input type="checkbox" id="tScanner"> Enable Scanner</label>
  <label><input type="checkbox" id="tBeep"> Beep Sound</label>
  <label><input type="checkbox" id="tDuplicate"> Duplicate Check</label>
  <label><input type="checkbox" id="tTime"> Time Recorder</label>
  <label><input type="checkbox" id="tLate"> Late Detection</label>
  <label><input type="checkbox" id="tBlock"> Block After Cutoff</label>
  <label><input type="time" id="lateTime" value="06:30"></label>

  <button onclick="saveSettings()">💾 Save Settings</button>
  <button onclick="clearLogs()">🗑️ Clear Logs</button>

  <h4>📋 Logs</h4>
  <table>
    <thead>
      <tr><th>#</th><th>LRN</th><th>Date</th><th>Time</th><th>Status</th></tr>
    </thead>
    <tbody id="logTable"></tbody>
  </table>
</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>
/* 👥 ADMINS */
const ADMINS = [
  {user:"admin", pass:"PNBARC@DE"},
  {user:"principal", pass:"PNB2026"},
  {user:"itadmin", pass:"IT@PNB"}
];

/* ⚙️ SETTINGS */
let settings = JSON.parse(localStorage.getItem("settings")) || {
  scanner:true, beep:true, duplicate:true,
  time:true, late:false, block:false, lateTime:"06:30"
};

let logs = JSON.parse(localStorage.getItem("logs") || "[]");
let scanner;

/* UTILS */
function now() {
  const d = new Date();
  return {
    date: d.toLocaleDateString(),
    time: d.toLocaleTimeString(),
    minutes: d.getHours()*60 + d.getMinutes()
  };
}
function save() {
  localStorage.setItem("settings", JSON.stringify(settings));
  localStorage.setItem("logs", JSON.stringify(logs));
}

/* SCANNER */
function onScanSuccess(text) {
  if (!settings.scanner) return;

  if (settings.beep) document.getElementById("beep").play();
  const lrn = text.trim();
  const t = now();

  if (settings.block && t.minutes > toMin(settings.lateTime)) {
    document.getElementById("status").innerHTML = "⛔ Scan Blocked";
    return;
  }

  if (settings.duplicate && logs.some(l => l.lrn===lrn && l.date===t.date)) {
    document.getElementById("status").innerHTML = "⚠️ Duplicate Scan";
    return;
  }

  let status = "On-time";
  if (settings.late && t.minutes > toMin(settings.lateTime)) status = "Late";

  logs.push({lrn, date:t.date, time:t.time, status});
  save();

  document.getElementById("status").innerHTML =
    `✅ ${lrn}<br>${t.date} ${t.time}<br>${status}`;

  scanner.clear();
  setTimeout(startScanner, 2000);
}

function startScanner() {
  scanner = new Html5QrcodeScanner(
    "reader",
    { fps:10, qrbox:{width:250,height:120} },
    false
  );
  scanner.render(onScanSuccess);
}
startScanner();

/* ADMIN */
function openAdmin(){
  document.getElementById("scannerView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
}
function login(){
  const u=username.value, p=password.value;
  if (ADMINS.find(a=>a.user===u && a.pass===p)){
    loginView.classList.add("hidden");
    adminView.classList.remove("hidden");
    loadSettings();
    loadLogs();
  } else loginMsg.innerText="❌ Invalid login";
}
function back(){ location.reload(); }

/* SETTINGS */
function loadSettings(){
  tScanner.checked=settings.scanner;
  tBeep.checked=settings.beep;
  tDuplicate.checked=settings.duplicate;
  tTime.checked=settings.time;
  tLate.checked=settings.late;
  tBlock.checked=settings.block;
  lateTime.value=settings.lateTime;
}
function saveSettings(){
  settings={
    scanner:tScanner.checked,
    beep:tBeep.checked,
    duplicate:tDuplicate.checked,
    time:tTime.checked,
    late:tLate.checked,
    block:tBlock.checked,
    lateTime:lateTime.value
  };
  save();
  alert("Settings Saved");
}

/* LOGS */
function loadLogs(){
  logTable.innerHTML="";
  logs.forEach((l,i)=>{
    logTable.innerHTML+=
    `<tr><td>${i+1}</td><td>${l.lrn}</td><td>${l.date}</td><td>${l.time}</td><td>${l.status}</td></tr>`;
  });
}
function clearLogs(){
  if(confirm("Clear all logs?")){
    logs=[];
    save();
    loadLogs();
  }
}

function toMin(t){
  const [h,m]=t.split(":");
  return (+h)*60+(+m);
}
</script>

</body>
</html>
