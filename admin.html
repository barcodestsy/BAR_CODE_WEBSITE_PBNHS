<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}
.card{
  width:95%;
  max-width:900px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
}
h2,h3,h4{text-align:center}
input{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  margin:8px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#00ffff,#00aaff);
}
label{display:block;margin:8px}
.hidden{display:none}
.logout-btn{
  background:linear-gradient(45deg,#ff4d4d,#ff0000);
  color:white
}
#statusMsg{text-align:center;margin-top:10px}
</style>
</head>

<body>
<div class="card">

<h2>🔐 PBNHS BARCODE ADMIN PANEL</h2>

<!-- LOGIN -->
<div id="loginView">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN -->
<div id="adminView" class="hidden">
  <button class="logout-btn" onclick="logout()">Logout</button>

  <h3>⚙️ System Controls</h3>

  <h4>Tools</h4>
  <label><input type="checkbox" id="SCANNER_ACTIVE"> Scanner Active</label>
  <label><input type="checkbox" id="DUPLICATE_BLOCK"> Duplicate Block</label>
  <label><input type="checkbox" id="TIME_RECORDER"> Time Recorder</label>
  <label><input type="checkbox" id="LATE_DETECTION"> Late Detection</label>
  <label><input type="checkbox" id="BLOCK_AFTER"> Block After Cutoff</label>
  <label>Late Time <input type="time" id="LATE_TIME"></label>

  <h4>Messaging</h4>
  <label><input type="checkbox" id="PARENT_SMS"> Parent SMS</label>
  <label><input type="checkbox" id="ADVISER_EMAIL"> Adviser Email</label>
  <label><input type="checkbox" id="MOCK_MODE"> Mock Mode</label>

  <button onclick="saveSettings()">💾 Save & Sync</button>
  <button onclick="clearLogs()">🗑 Clear Logs</button>

  <p id="statusMsg"></p>
</div>

</div>

<script>
/* ===============================
   CONFIG
================================ */
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbxx4Ml3adiJ9BETJitCtuPo_wc4Qxgn59vp3XMuZBLy4CCBbw8IqDTF-dYtQr10t_r4og/exec";

/* ===============================
   GET ELEMENTS (IMPORTANT FIX)
================================ */
const username = document.getElementById("username");
const password = document.getElementById("password");
const loginMsg = document.getElementById("loginMsg");
const loginView = document.getElementById("loginView");
const adminView = document.getElementById("adminView");
const statusMsg = document.getElementById("statusMsg");

/* ===============================
   LOGIN
================================ */
async function login(){
  loginMsg.innerText="Checking...";

  try{
    const res = await fetch(WEB_APP_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        action:"login",
        username: username.value.trim(),
        password: password.value.trim()
      })
    });

    const r = await res.json();

    if(r.success){
      loginView.classList.add("hidden");
      adminView.classList.remove("hidden");
      loadSettings();
    }else{
      loginMsg.innerText="❌ Invalid login";
    }

  }catch(err){
    loginMsg.innerText="❌ Server not reachable";
    console.error(err);
  }
}

/* ===============================
   LOGOUT
================================ */
function logout(){
  fetch(WEB_APP_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ action:"logout" })
  }).finally(()=>location.reload());
}

/* ===============================
   LOAD SETTINGS
================================ */
async function loadSettings(){
  const r = await fetch(WEB_APP_URL + "?mode=settings");
  const s = await r.json();

  for(const k in s){
    const el = document.getElementById(k);
    if(!el) continue;
    if(el.type==="checkbox") el.checked = s[k]===true;
    else el.value = s[k];
  }
}

/* ===============================
   SAVE SETTINGS
================================ */
async function saveSettings(){
  const data = {};

  document.querySelectorAll("#adminView input").forEach(i=>{
    if(i.type==="checkbox") data[i.id]=i.checked;
    else data[i.id]=i.value;
  });

  const r = await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"updateSettings",
      settings:data
    })
  });

  const res = await r.json();

  statusMsg.innerText = res.success
    ? "✅ Settings synced system-wide"
    : "❌ Update failed";
}

/* ===============================
   CLEAR LOGS
================================ */
async function clearLogs(){
  if(!confirm("Clear all admin logs?")) return;

  await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ action:"clearAdminLogs" })
  });

  statusMsg.innerText="🗑 Logs cleared";
}
</script>

</body>
</html>
