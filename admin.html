<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}
.card{
  width:95%;
  max-width:900px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
}
h2,h3,h4{text-align:center}
input{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  margin:8px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#00ffff,#00aaff);
}
label{display:block;margin:8px}
.hidden{display:none}
.logout-btn{
  background:linear-gradient(45deg,#ff4d4d,#ff0000);
  color:white
}
#statusMsg{text-align:center;margin-top:10px}
</style>
</head>

<body>
<div class="card">

<h2>🔐 PBNHS BARCODE ADMIN PANEL</h2>

<!-- LOGIN -->
<div id="loginView">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN -->
<div id="adminView" class="hidden">
  <button class="logout-btn" onclick="logout()">Logout</button>

  <h3>⚙️ System Controls</h3>

  <h4>Tools</h4>
  <label><input type="checkbox" id="duplicate"> Duplicate Check</label>
  <label><input type="checkbox" id="time"> Time Recorder</label>
  <label><input type="checkbox" id="late"> Late Detection</label>
  <label><input type="checkbox" id="block"> Block After Cutoff</label>
  <label>Late Time <input type="time" id="lateTime"></label>

  <h4>Messaging</h4>
  <label><input type="checkbox" id="parentMsg"> Parent SMS</label>
  <label><input type="checkbox" id="adviserMsg"> Adviser Email</label>
  <label><input type="checkbox" id="mockMsg"> Mock Mode</label>

  <button onclick="saveSettings()">💾 Save & Sync</button>

  <p id="statusMsg"></p>
</div>

</div>

<script>
/* ===============================
   CONFIG
================================ */
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbzZB-2GVE_TdkvdmCqgnwHVv_Yb9aFP10yul4cy24jYXXPuMnBODWV9zNzEAagnBYI/exec";

/* ===============================
   SIMPLE ADMIN LOGIN (FRONTEND)
================================ */
const ADMINS = [
  {u:"admin", p:"PNBARC@DE"},
  {u:"principal", p:"PNB2026"},
  {u:"itadmin", p:"IT@PNB"}
];

function login(){
  const u = username.value.trim();
  const p = password.value.trim();

  const ok = ADMINS.find(a=>a.u===u && a.p===p);
  if(!ok){
    loginMsg.innerText="❌ Invalid login";
    return;
  }

  loginView.classList.add("hidden");
  adminView.classList.remove("hidden");
  loadSettings();
}

function logout(){
  location.reload();
}

/* ===============================
   LOAD SETTINGS FROM SHEET
================================ */
async function loadSettings(){
  statusMsg.innerText="Loading settings...";

  try{
    const r = await fetch(WEB_APP_URL+"?mode=settings");
    const s = await r.json();

    for(const k in s){
      const el = document.getElementById(k);
      if(!el) continue;
      if(el.type==="checkbox") el.checked = s[k] === true;
      else el.value = s[k];
    }

    statusMsg.innerText="✅ Settings loaded";

  }catch(e){
    statusMsg.innerText="❌ Cannot load settings";
    console.error(e);
  }
}

/* ===============================
   SAVE SETTINGS TO SHEET
================================ */
async function saveSettings(){
  const settings = {
    duplicate : duplicate.checked,
    time      : time.checked,
    late      : late.checked,
    block     : block.checked,
    lateTime  : lateTime.value,
    parentMsg : parentMsg.checked,
    adviserMsg: adviserMsg.checked,
    mockMsg   : mockMsg.checked
  };

  statusMsg.innerText="Saving...";

  try{
    const r = await fetch(WEB_APP_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        action:"updateSettings",
        settings: SETTINGS
      })
    });

    const res = await r.json();
    statusMsg.innerText = res.success
      ? "✅ Settings synced system-wide"
      : "❌ Update failed";

  }catch(e){
    statusMsg.innerText="❌ Server error";
    console.error(e);
  }
}
</script>

</body>
</html>
